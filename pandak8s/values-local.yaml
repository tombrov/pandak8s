# Local override values for running pandak8s on a kind cluster.
# Usage with ArgoCD CLI:
#   argocd app create pandak8s ... --values values-local.yaml
# Usage with helm directly:
#   helm install pandak8s ./pandak8s -f pandak8s/values-local.yaml -n pandak8s --create-namespace

ingress-nginx:
  controller:
    hostPort:
      enabled: true
    service:
      type: NodePort
      annotations: {}
    nodeSelector:
      ingress-ready: "true"
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Equal"
        effect: "NoSchedule"

frontend:
  replicaCount: 1
  image:
    repository: brovy/pandak8s-frontend
    tag: latest
    pullPolicy: IfNotPresent
  env:
    backendHost: backend

backend:
  replicaCount: 1
  image:
    repository: brovy/pandak8s-backend
    tag: latest
    pullPolicy: IfNotPresent
